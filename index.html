<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome / Bienvenidos</title>
    
    <script>
        // 1. Check the user's browser language settings
        const userLanguage = navigator.language || navigator.userLanguage;

        // 2. If their browser is set to Spanish, send them to the /es/ folder
        if (userLanguage.toLowerCase().startsWith('es')) {
            window.location.replace("/es/");
        } 
        // 3. For any other language (English, French, etc.), send them to /en/
        else {
            window.location.replace("/en/");
        }
    </script>
    
    <!-- Inline styles to make the manual fallback page look clean if JS is turned off -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 2rem; font-weight: 400; }
        .links { display: flex; gap: 2rem; }
        a {
            text-decoration: none;
            color: #0066cc;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border: 1px solid #0066cc;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        a:hover { background-color: #0066cc; color: white; }
    </style>
</head>
<body>

    <!-- This HTML only shows up if the user has JavaScript disabled in their browser -->
    <h1>Select your language / Seleccione su idioma</h1>
    
    <div class="links">
        <a href="/en/">English</a>
        <a href="/es/">Español</a>
    </div>

</body>
</html>
